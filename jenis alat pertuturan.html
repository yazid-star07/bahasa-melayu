<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alat Pertuturan</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* ===== BACKGROUND ===== */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
}

/* ===== CONTAINER ===== */
.container{
  text-align:center;
  padding:40px;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  width:320px;
  animation:fadeIn 1s ease;
}

/* TITLE */
h1{
  margin-bottom:20px;
}

/* BUTTON */
.btn{
  position:relative;
  overflow:hidden;
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

/* HOVER */
.btn:hover{
  transform:scale(1.05);
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* CLICK */
.btn:active{
  transform:scale(0.95);
}

/* RIPPLE */
.btn span{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:ripple 0.6s linear;
  background:rgba(255,255,255,0.5);
}

@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}

/* ===== BACK BUTTON ===== */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  backdrop-filter: blur(10px);
  box-shadow:0 0 10px rgba(255,255,255,0.2);
  transition:0.3s;
  overflow:hidden;
}

.back-btn:hover{
  background:rgba(255,255,255,0.3);
  box-shadow:0 0 10px #fff,0 0 20px #fff;
}

/* ripple back */
.back-btn span{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:ripple 0.6s linear;
  background:rgba(255,255,255,0.6);
}

/* ANIMATION */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="goBack()">⬅ Kembali</button>

<!-- CONTENT -->
<div class="container">
  <h1>Alat Pertuturan</h1>

  <button class="btn" onclick="goPage('alatpertuturanaktif.html')">🗣️ Alat Pertuturan Aktif</button>
  <button class="btn" onclick="goPage('alatpertuturanpasif.html')">📚 Alat Pertuturan Pasif</button>
</div>

<script>

/* NAVIGATION */
function goPage(page){
  window.location.href = page;
}

function goBack(){
  window.location.href = "pilihan.html";
}

/* RIPPLE EFFECT */
document.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("click", function(e){
    let x = e.clientX - e.target.offsetLeft;
    let y = e.clientY - e.target.offsetTop;

    let ripple = document.createElement("span");
    ripple.style.left = x + "px";
    ripple.style.top = y + "px";

    this.appendChild(ripple);

    setTimeout(()=> ripple.remove(),600);
  });
});

</script>

</body>
</html>
