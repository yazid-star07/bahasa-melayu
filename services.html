<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Services Interactive</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

/* ===== BACKGROUND ===== */
body{
  background: radial-gradient(ellipse at bottom,#0d0d1a 0%,#000 100%);
  color:white;
  text-align:center;
  padding:20px;
  overflow-x:hidden;
}

/* ===== STARS ===== */
.star{
  position:fixed;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:twinkle 3s infinite;
}

@keyframes twinkle{
  0%,100%{opacity:0.3;}
  50%{opacity:1;}
}

/* ===== BACK BUTTON ===== */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  backdrop-filter: blur(10px);
  box-shadow:0 0 10px rgba(255,255,255,0.2);
  transition:0.3s;
  overflow:hidden;
  z-index:10;
}

.back-btn:hover{
  background:rgba(255,255,255,0.3);
  box-shadow:0 0 10px #fff,0 0 20px #fff;
}

/* ripple */
.back-btn span{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:ripple 0.6s linear;
  background:rgba(255,255,255,0.6);
}

@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}

/* ===== TITLE ===== */
h1{
  color:#ffcc00;
  text-shadow:0 0 10px #ffcc00;
}

p{
  margin-bottom:30px;
}

/* ===== IMAGE ===== */
.image-container{
  position:relative;
  display:inline-block;
  margin-top:20px;
}

.image-container img{
  width:500px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* ===== BULATAN ===== */
.area-dot{
  position:absolute;
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(255,255,0,0.3);
  transform:translate(-50%,-50%);
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  color:black;
  transition:0.3s;
  z-index:2;
}

.area-dot:hover{
  background:rgba(255,255,0,0.7);
  box-shadow:0 0 10px #ffcc00,0 0 20px #ffcc00;
}

/* ===== LABEL ===== */
.label{
  position:absolute;
  color:white;
  font-size:14px;
  pointer-events:none;
  width:100px;
  text-align:center;
}

.label-left{
  transform:translate(-120%,-50%);
  text-align:right;
}

.label-right{
  transform:translate(20%,-50%);
  text-align:left;
}
</style>
</head>

<body>

<!-- BACK BUTTON TOP LEFT -->
<a href="pilihan.html" class="back-btn">⬅ Kembali</a>

<p>Klik nombor di bulatan untuk info</p>

<script>

/* BACK FUNCTION */
function goBack(){
  window.location.href="pilihan.html";
}

/* RIPPLE */
document.querySelector(".back-btn").addEventListener("click", function(e){
  let x = e.clientX - e.target.offsetLeft;
  let y = e.clientY - e.target.offsetTop;

  let ripple = document.createElement("span");
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";

  this.appendChild(ripple);

  setTimeout(()=> ripple.remove(),600);
});

/* STARS */
for(let i=0;i<120;i++){
  let star=document.createElement('div');
  star.className='star';
  star.style.top=Math.random()*100+'vh';
  star.style.left=Math.random()*100+'vw';
  document.body.appendChild(star);
}

</script>

</body>
